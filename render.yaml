services:
  - type: web
    name: slaylist
    runtime: python
    repo: https://github.com/Adithyan-cb/slaylist
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 2 --log-level info --no-access-log
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_MODEL
        value: nvidia/nemotron-nano-12b-v2-vl:free
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_TEMPERATURE
        value: "0.7"
      - key: CACHE_TTL_SECONDS
        value: "86400"
