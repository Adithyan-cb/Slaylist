<!doctype html>

<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>SLAYLIST - Aura score</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400;500;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "text-muted": "#8A7A9E",
                            "tertiary-container": "#5e6205",
                            primary: "#dfb7ff",
                            "on-error-container": "#ffdad6",
                            "secondary-fixed": "#f8d8ff",
                            "on-primary-fixed": "#2c054a",
                            "on-surface": "#e8e0e7",
                            "on-tertiary-container": "#d9de79",
                            "on-primary-fixed-variant": "#5a3778",
                            "outline-variant": "#4b444f",
                            "on-secondary-fixed": "#2f083f",
                            "secondary-container": "#613971",
                            "surface-container-lowest": "#100d12",
                            "secondary-fixed-dim": "#e6b5f6",
                            secondary: "#e6b5f6",
                            "inverse-on-surface": "#332f34",
                            "text-secondary": "#C4B5D8",
                            "surface-dim": "#151217",
                            "primary-container": "#724e91",
                            "surface-bright": "#3c383d",
                            "on-tertiary-fixed-variant": "#474a00",
                            "surface-tint": "#dfb7ff",
                            "page-bg": "#1A1025",
                            "inverse-primary": "#734f92",
                            "inverse-surface": "#e8e0e7",
                            "tertiary-fixed": "#e4e983",
                            "surface-container-highest": "#373339",
                            outline: "#978e9a",
                            "primary-fixed-dim": "#dfb7ff",
                            "on-tertiary": "#303300",
                            "on-secondary": "#462056",
                            "card-bg": "#22162B",
                            "input-bg": "#2D1D3D",
                            "on-tertiary-fixed": "#1c1d00",
                            "surface-container": "#221e23",
                            "on-background": "#e8e0e7",
                            "surface-container-high": "#2c292e",
                            "on-primary": "#421f60",
                            background: "#151217",
                            "error-container": "#93000a",
                            "surface-container-low": "#1e1a1f",
                            "text-primary": "#FFFFFF",
                            "primary-fixed": "#f1daff",
                            "on-error": "#690005",
                            "on-surface-variant": "#cdc3d0",
                            "on-secondary-fixed-variant": "#5e376e",
                            "on-secondary-container": "#d7a7e7",
                            "on-primary-container": "#eaccff",
                            error: "#ffb4ab",
                            "tertiary-fixed-dim": "#c8cc6a",
                            "surface-variant": "#373339",
                            tertiary: "#c8cc6a",
                            "badge-bg": "#0F0A14",
                            surface: "#151217",
                        },
                        borderRadius: {
                            DEFAULT: "0.25rem",
                            lg: "0.5rem",
                            xl: "0.75rem",
                            full: "9999px",
                        },
                        spacing: {
                            xxl: "3rem",
                            section_mobile: "2rem",
                            unit: "0.25rem",
                            "container-max": "640px",
                            "stack-lg": "1.5rem",
                            md: "1rem",
                            xs: "0.5rem",
                            container_max: "640px",
                            xl: "2rem",
                            lg: "1.5rem",
                            container_padding: "1rem",
                            "section-desktop": "4rem",
                            "gutter-md": "1rem",
                            sm: "0.75rem",
                            section_desktop: "4rem",
                            "stack-xl": "2rem",
                        },
                        fontFamily: {
                            "body-base": ["JetBrains Mono", "monospace"],
                            "data-mono": ["JetBrains Mono", "monospace"],
                            "label-tiny": ["JetBrains Mono", "monospace"],
                            "headline-hero-mobile": ["Anton"],
                            "score-display-mobile": ["Anton"],
                            "headline-hero": ["Anton"],
                            "score-display": ["Anton"],
                        },
                        fontSize: {
                            "body-base": [
                                "1rem",
                                { lineHeight: "1.5", fontWeight: "400" },
                            ],
                            "data-mono": [
                                "0.875rem",
                                { lineHeight: "1.25", fontWeight: "500" },
                            ],
                            "label-tiny": [
                                "0.75rem",
                                { lineHeight: "1.25", fontWeight: "500" },
                            ],
                            "headline-hero-mobile": [
                                "2.5rem",
                                { lineHeight: "1.1", fontWeight: "400" },
                            ],
                            "score-display-mobile": [
                                "4rem",
                                { lineHeight: "1.1", fontWeight: "400" },
                            ],
                            "headline-hero": [
                                "3rem",
                                { lineHeight: "1.1", fontWeight: "400" },
                            ],
                            "score-display": [
                                "5rem",
                                {
                                    lineHeight: "1.1",
                                    letterSpacing: "0.02em",
                                    fontWeight: "400",
                                },
                            ],
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                background-color: #1a1025;
                color: #e8e0e7;
                -webkit-font-smoothing: antialiased;
            }
            .glow-primary {
                box-shadow: 0 0 30px rgba(114, 78, 145, 0.4);
            }
            .neon-border {
                border: 3px solid #724e91;
                box-shadow: 0 0 20px rgba(114, 78, 145, 0.8);
            }
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: #1a1025;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #724e91;
                border-radius: 10px;
            }
            .story-card {
                position: fixed;
                top: 0;
                left: 0;
                z-index: -9999;
                opacity: 0;
                pointer-events: none;
                width: 360px;
                height: 640px;
                background: #1a1025;
            }
            .story-card-inner {
                display: flex;
                flex-direction: column;
                align-items: center;
                height: 100%;
                padding: 40px 28px 28px;
                position: relative;
            }
            .story-card-inner::before {
                content: "";
                position: absolute;
                top: 16px;
                left: 16px;
                right: 16px;
                bottom: 16px;
                border: 4px solid #724e91;
                box-shadow:
                    0 0 30px rgba(114, 78, 145, 0.3),
                    inset 0 0 30px rgba(114, 78, 145, 0.15);
                pointer-events: none;
            }
            .story-header {
                font-family: "JetBrains Mono", monospace;
                font-size: 12px;
                letter-spacing: 4px;
                color: #8a7a9e;
                text-transform: uppercase;
                margin-bottom: 20px;
            }
            .story-badge {
                background: #0f0a14;
                border: 3px solid #724e91;
                box-shadow: 0 0 20px rgba(114, 78, 145, 0.8);
                border-radius: 12px;
                padding: 32px 40px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                width: 260px;
            }
            .story-score {
                font-family: "Anton", sans-serif;
                font-size: 96px;
                line-height: 1;
                color: #dfb7ff;
                letter-spacing: 0.02em;
                text-shadow: 0 0 30px rgba(114, 78, 145, 0.5);
            }
            .story-max-score {
                font-family: "JetBrains Mono", monospace;
                font-size: 24px;
                font-weight: 700;
                color: #8a7a9e;
                margin-bottom: 12px;
                margin-top: 4px;
            }
            .story-divider {
                width: 48px;
                border: none;
                border-top: 1px solid #724e91;
                margin: 8px 0 12px;
            }
            .story-tier {
                font-family: "Anton", sans-serif;
                font-size: 20px;
                letter-spacing: 4px;
                color: #dfb7ff;
                text-transform: uppercase;
                text-align: center;
            }
            .story-roast {
                font-family: "JetBrains Mono", monospace;
                font-size: 13px;
                line-height: 1.5;
                color: #cdc3d0;
                text-align: center;
                max-width: 260px;
                margin-top: 24px;
                flex: 1;
                display: flex;
                align-items: center;
            }
            .story-watermark {
                font-family: "JetBrains Mono", monospace;
                font-size: 11px;
                letter-spacing: 2px;
                color: rgba(223, 183, 255, 0.2);
                text-transform: uppercase;
                margin-top: 16px;
            }
        </style>
    </head>
    <body class="font-body-base overflow-x-hidden">
        <!-- TopAppBar -->
        <header
            class="fixed top-0 w-full z-50 shadow-[0_4px_20px_rgba(114,78,145,0.25)] h-16 bg-background/80 backdrop-blur-md"
        >
            <div
                class="flex justify-between items-center px-6 h-full max-w-7xl mx-auto"
            >
                <h1
                    class="font-headline-hero-mobile text-headline-hero-mobile tracking-tighter text-primary"
                >
                    SLAYLIST
                </h1>
                <div class="flex items-center gap-sm">
                    <a
                        class="text-primary hover:opacity-80 transition-opacity"
                        href="https://github.com/Adithyan-cb/slaylist"
                    >
                        <svg
                            class="w-6 h-6 fill-current"
                            viewbox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
                            ></path>
                        </svg>
                    </a>
                </div>
            </div>
        </header>
        <main class="pt-24 pb-32 px-md max-w-container-max mx-auto space-y-xl">
            <!-- Score Hero Section -->
            <section class="flex flex-col items-center text-center space-y-md">
                <div
                    class="bg-[#0f0a14] neon-border rounded-xl p-xl flex flex-col items-center justify-center min-w-[280px] aspect-square transform transition-transform hover:scale-105 duration-300"
                    id="badge-card"
                >
                    <span
                        class="font-data-mono text-text-secondary text-label-tiny tracking-widest mb-2 uppercase"
                        >Slaylist</span
                    >
                    <div
                        class="font-score-display-mobile text-score-display-mobile text-primary leading-none mb-1"
                    >
                        <span id="score">—</span>
                    </div>
                    <span
                        class="font-data-mono text-text-muted text-label-tiny"
                        id="max-score"
                        >/ 100</span
                    >
                    <hr class="w-12 border-primary-container my-4" />
                    <h3
                        class="font-headline-hero-mobile text-[1.5rem] text-primary uppercase tracking-wider"
                        id="tier-title"
                    >
                        —
                    </h3>
                </div>
                <p
                    class="font-body-base text-text-secondary max-w-[320px] italic"
                    id="tagline"
                ></p>
            </section>
            <!-- Roast -->
            <section class="relative py-xl text-center">
                <span
                    class="absolute top-0 left-1/2 -translate-x-1/2 font-headline-hero text-primary/10 text-8xl pointer-events-none select-none"
                    >"</span
                >
                <p
                    class="font-body-base text-lg text-text-secondary relative z-10 px-md leading-relaxed"
                    id="roast"
                ></p>
            </section>
            <!-- Share Section -->
            <section class="flex flex-col items-center gap-lg">
                <div class="text-center">
                    <h2
                        class="font-headline-hero-mobile text-[1.5rem] text-primary uppercase"
                    >
                        DOWNLOAD YOUR PLAYLIST AURA SCORE
                    </h2>
                </div>
                <div class="flex flex-col w-full gap-sm">
                    <button
                        class="w-full bg-primary py-md rounded-xl text-on-primary-fixed font-bold flex items-center justify-center gap-2 glow-primary active:scale-95 transition-transform"
                        id="download-btn"
                    >
                        <span
                            class="material-symbols-outlined"
                            data-icon="download"
                            >download</span
                        >
                        DOWNLOAD YOUR AURA SCORE
                    </button>
                    <button
                        class="w-full border border-primary/40 py-md rounded-xl text-primary font-bold hover:bg-primary/10 active:scale-95 transition-transform"
                        id="try-another"
                    >
                        TRY ANOTHER PLAYLIST
                    </button>
                </div>
            </section>
        </main>
        <script>
            const badge = document.querySelector("#badge-card");
            if (badge) {
                let angle = 0;
                function animate() {
                    angle += 0.02;
                    const y = Math.sin(angle) * 5;
                    badge.style.transform = `translateY(${y}px)`;
                    requestAnimationFrame(animate);
                }
                animate();
            }
        </script>
        <!-- Instagram Story Card (hidden, used for PNG download) -->
        <div class="story-card" id="story-card">
            <div class="story-card-inner">
                <div class="story-header">Slaylist</div>
                <div class="story-badge">
                    <div class="story-score" id="story-score">—</div>
                    <div class="story-max-score" id="story-max-score">
                        / 100
                    </div>
                    <hr class="story-divider" />
                    <div class="story-tier" id="story-tier">—</div>
                </div>
                <div class="story-roast" id="story-roast"></div>
            </div>
        </div>

        <footer
            class="w-full py-lg px-md border-t border-primary-container/20 bg-surface-container-lowest flex flex-col items-center gap-sm text-center"
        >
            <h4
                class="font-headline-hero-mobile text-xl text-primary tracking-tighter"
            >
                SLAYLIST
            </h4>
            <a
                class="font-data-mono text-xs text-text-muted hover:text-primary transition-colors"
                href="https://github.com/Adithyan-cb/slaylist"
            >
                GITHUB
            </a>
        </footer>

        <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
        <script src="/js/result.js" defer></script>
    </body>
</html>
